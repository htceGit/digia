<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <!-- Definitions for advanced gradients and filters -->
  <defs>
    <!-- Primary vibrant gradient for the abstract "Brain/Circuit" icon -->
    <linearGradient id="aiGradientColor" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue 500 -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- Indigo 500 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- Purple 500 -->
    </linearGradient>

    <!-- Glowing drop shadow for the logo icon -->
    <filter id="glowColor" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Left Icon: Modern Abstract AI / Node Mapping Graphic -->
  <g transform="translate(10, 15)" filter="url(#glowColor)">
    <!-- Central Processing Core -->
    <path d="M45 10 L80 30 L80 70 L45 90 L10 70 L10 30 Z" 
          fill="none" 
          stroke="url(#aiGradientColor)" 
          stroke-width="6" 
          stroke-linejoin="round"/>
          
    <!-- Inner Circuit/Neural Routes -->
    <circle cx="45" cy="50" r="10" fill="url(#aiGradientColor)"/>
    <path d="M45 50 L45 10 M45 50 L10 70 M45 50 L80 70" 
          stroke="url(#aiGradientColor)" 
          stroke-width="4" 
          stroke-linecap="round"/>
          
    <circle cx="45" cy="10" r="4" fill="#6366f1"/>
    <circle cx="10" cy="70" r="4" fill="#3b82f6"/>
    <circle cx="80" cy="70" r="4" fill="#a855f7"/>
  </g>

  <!-- Typography: "DigIA" -->
  <g transform="translate(110, 75)">
    <!-- 'Dig' in sleek modern sans-serif -->
    <text x="0" y="0" 
          font-family="'Inter', 'Outfit', system-ui, sans-serif" 
          font-size="64" 
          font-weight="700" 
          fill="#1e293b" 
          letter-spacing="-1.5">
      Dig
    </text>
    
    <!-- 'IA' (Artificial Intelligence) in gradient indicating smart capability -->
    <text x="108" y="0" 
          font-family="'Inter', 'Outfit', system-ui, sans-serif" 
          font-size="64" 
          font-weight="900" 
          fill="url(#aiGradientColor)" 
          letter-spacing="-1">
      IA
    </text>
    
    <!-- Tiny abstract smart dot over the I -->
    <circle cx="127" cy="-56" r="6" fill="#a855f7" />
  </g>
</svg>
